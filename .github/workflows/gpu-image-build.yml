name: GPU image build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-gpu-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build full GPU image
        run: docker build --target gpu -t evomax:gpu .
